<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HospiSync – Login</title>
    <meta name="description" content="HospiSync – Intelligent Hospital Load Forecasting and Patient Distribution System. Monitor beds, predict load, transfer patients.">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Authenticating...</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <h1><span class="logo-icon">🏥</span> HospiSync</h1>
                    <p>Intelligent Hospital Load Forecasting & Distribution</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="admin@hospital.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>

                    <div class="error-message" id="loginError"></div>

                    <div class="flex flex-col gap-4 mt-6">
                        <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg hover:shadow-blue-500/25 hover:from-blue-700 hover:to-indigo-700 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2" id="loginBtn">
                            <span>🔐</span> Sign In
                        </button>
                    </div>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="/register.html">Register Hospital</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
