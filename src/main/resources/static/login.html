<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HospiSync – Login</title>
    <meta name="description" content="HospiSync – Intelligent Hospital Load Forecasting and Patient Distribution System. Monitor beds, predict load, transfer patients.">
    
    <!-- Design System: Clinical Precision -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "background": "#f6fafe",
                        "on-primary-fixed": "#001a40",
                        "primary-fixed": "#d8e2ff",
                        "surface-variant": "#dfe3e7",
                        "on-tertiary-container": "#b3c1ff",
                        "on-primary-fixed-variant": "#064490",
                        "inverse-on-surface": "#edf1f5",
                        "surface": "#f6fafe",
                        "surface-container-low": "#f0f4f8",
                        "on-background": "#171c1f",
                        "secondary-fixed-dim": "#b2c8ed",
                        "tertiary-fixed-dim": "#b7c4ff",
                        "on-error-container": "#93000a",
                        "surface-dim": "#d6dade",
                        "outline": "#737782",
                        "surface-bright": "#f6fafe",
                        "on-secondary-fixed": "#021c39",
                        "primary-container": "#1b4f9b",
                        "primary-fixed-dim": "#acc7ff",
                        "on-tertiary": "#ffffff",
                        "primary": "#00387a",
                        "error-container": "#ffdad6",
                        "on-secondary-container": "#495e7e",
                        "surface-container-low": "#f0f4f8",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#4a5f7f",
                        "surface-tint": "#2d5da9",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#324866",
                        "surface-container-highest": "#dfe3e7",
                        "on-surface-variant": "#434751",
                        "secondary-container": "#c2d8fe",
                        "on-primary-container": "#a8c4ff",
                        "tertiary-container": "#0041cd",
                        "outline-variant": "#c3c6d3",
                        "surface-container": "#eaeef2",
                        "tertiary": "#002e98",
                        "tertiary-fixed": "#dce1ff",
                        "on-tertiary-fixed": "#001551",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#171c1f",
                        "inverse-surface": "#2c3134",
                        "secondary-fixed": "#d4e3ff",
                        "inverse-primary": "#acc7ff",
                        "on-tertiary-fixed-variant": "#0039b5"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "ambient": "0px 8px 24px rgba(15, 39, 68, 0.06)"
                    }
                },
            },
        }
    </script>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle diagonal grid pattern background */
        .bg-grid-pattern {
            background-color: #f6fafe;
            background-image: linear-gradient(45deg, #f0f4f8 12.5%, transparent 12.5%, transparent 50%, #f0f4f8 50%, #f0f4f8 62.5%, transparent 62.5%, transparent 100%);
            background-size: 8px 8px;
        }

        /* Functional Classes from FILE 1 / style.css */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 26, 64, 0.85); /* on-primary-fixed */
            backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #acc7ff; /* primary-fixed-dim */
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed;
            top: 24px; right: 24px;
            z-index: 10000;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            animation: slideIn 0.3s ease;
        }
        .toast.active { display: flex; align-items: center; gap: 8px; }
        .toast.success { background: #008744; color: white; }
        .toast.error { background: #ba1a1a; color: white; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Clinical Precision: Minimalist Inputs */
        .technical-input {
            background: #dfe3e7; /* surface-container-highest */
            border: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .technical-input:focus {
            outline: none;
            border-bottom-color: #00387a; /* primary */
            background: #f0f4f8; /* surface-container-low */
            box-shadow: none;
        }

        /* Error message styling */
        .error-message {
            color: #ba1a1a;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            font-weight: 500;
        }
        .error-message.active { display: block; }
    </style>
</head>
<body class="bg-grid-pattern font-body min-h-screen flex items-center justify-center p-6 text-on-background">

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="text-white font-medium">Authenticating...</p>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Login Container -->
    <main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl shadow-ambient overflow-hidden relative border border-outline-variant/15">
        <!-- Top Brand Accent -->
        <div class="h-1.5 bg-gradient-to-r from-primary to-primary-container w-full"></div>
        
        <div class="p-10 flex flex-col items-center">
            <!-- Logo & Branding -->
            <div class="mb-10 flex flex-col items-center">
                <div class="w-16 h-16 bg-primary-fixed rounded-full flex items-center justify-center mb-4 shadow-sm">
                    <span class="material-symbols-outlined text-primary text-4xl" data-icon="emergency">emergency</span>
                </div>
                <h1 class="text-3xl font-extrabold text-on-primary-fixed tracking-tight headline">HospiSync</h1>
                <p class="text-on-surface-variant text-[10px] mt-3 text-center max-w-[260px] font-bold uppercase tracking-[0.2em]">
                    Intelligent Hospital Load Forecasting & Distribution
                </p>
            </div>

            <!-- Separator: Using background shift per Clinical Precision rules -->
            <div class="w-full h-px bg-surface-container mb-8"></div>

            <!-- Form -->
            <form id="loginForm" class="w-full space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest pl-1" for="email">Email Address</label>
                    <div class="relative">
                        <input class="w-full px-4 py-3 technical-input rounded-t text-on-surface text-sm" id="email" placeholder="administrator@hospital.org" type="email" required autocomplete="email"/>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest pl-1" for="password">Password</label>
                    </div>
                    <div class="relative">
                        <input class="w-full px-4 py-3 technical-input rounded-t text-on-surface text-sm" id="password" placeholder="••••••••" type="password" required autocomplete="current-password"/>
                        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button" id="togglePassword">
                            <span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Error Message div from FILE 1 -->
                <div class="error-message" id="loginError"></div>

                <!-- Action Button: Gradient + Radiant Shadow -->
                <button class="w-full h-12 bg-gradient-to-r from-primary to-primary-container hover:brightness-110 text-white font-bold rounded shadow-lg shadow-primary-container/20 transition-all flex items-center justify-center gap-2 group mt-8" type="submit" id="loginBtn">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="login">login</span>
                </button>
            </form>

            <!-- Secondary Links -->
            <div class="mt-10 text-center">
                <p class="text-sm text-on-surface-variant font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="/register.html">Register Hospital</a>
                </p>
            </div>

            <!-- System Footer -->
            <footer class="mt-12 text-center">
                <p class="text-[9px] text-outline uppercase tracking-[0.25em] font-semibold opacity-70">
                    © 2026 HospiSync — Authorized Access Only
                </p>
                <div class="mt-6 flex justify-center gap-3">
                    <div class="h-1 w-6 bg-surface-container rounded-full"></div>
                    <div class="h-1 w-6 bg-primary-fixed-dim rounded-full"></div>
                    <div class="h-1 w-6 bg-surface-container rounded-full"></div>
                </div>
            </footer>
        </div>
    </main>

    <!-- Background Decorative Elements -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
        <div class="absolute top-10 left-10 w-72 h-72 bg-primary-fixed blur-[120px] rounded-full"></div>
        <div class="absolute bottom-10 right-10 w-96 h-96 bg-secondary-fixed blur-[160px] rounded-full"></div>
    </div>

    <!-- Scripts from FILE 1 -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    
    <!-- Password Visibility Toggle (Small UI enhancement) -->
    <script>
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');
        if (toggleBtn && passInput) {
            toggleBtn.addEventListener('click', () => {
                const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passInput.setAttribute('type', type);
                toggleBtn.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }
    </script>
</body>
</html>
